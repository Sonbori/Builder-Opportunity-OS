# Builder Opportunity OS scanner template

title_filter:
  positive:
    - "Data Engineer"
    - "Analytics Engineer"
    - "Data Platform"
    - "Data Infrastructure"
    - "Python Automation"
    - "Automation Engineer"
    - "Workflow Automation"
    - "AI Engineer"
    - "LLMOps"
    - "MLOps"
    - "Applied AI"
    - "Airflow"
    - "Kafka"
    - "Spark"
  negative:
    - "Intern"
    - "Junior"
    - "Sales"
    - "Manual QA"
    - "PHP"
    - "WordPress"
    - "SAP"
    - "Oracle"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Founding"

search_queries:
  - name: Wanted Data Roles
    query: 'site:wanted.co.kr/wd "Data Engineer" OR "Analytics Engineer" OR "Data Platform"'
    enabled: true

  - name: Wanted Automation Roles
    query: 'site:wanted.co.kr/wd "Python Automation" OR "Automation Engineer" OR "Workflow"'
    enabled: true

  - name: Jumpit Data Roles
    query: 'site:jumpit.saramin.co.kr "Data Engineer" OR "Data Platform" OR "Backend Data"'
    enabled: true

  - name: Jumpit AI Roles
    query: 'site:jumpit.saramin.co.kr "AI Engineer" OR "MLOps" OR "LLMOps"'
    enabled: true

  - name: Ashby Automation
    query: 'site:jobs.ashbyhq.com "Automation Engineer" OR "Data Engineer" OR "Applied AI" remote'
    enabled: true

  - name: Greenhouse Data Infra
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "Data Engineer" OR "Platform Engineer" remote'
    enabled: true

tracked_companies:
  - name: Toss
    careers_url: https://toss.im/career/jobs
    enabled: true

  - name: Danggeun
    careers_url: https://about.daangn.com/jobs/
    enabled: true

  - name: Kurly
    careers_url: https://www.kurlycorp.com/careers
    enabled: true

  - name: Wantedlab
    careers_url: https://www.wantedlab.com/careers
    enabled: true

  - name: Vercel
    careers_url: https://job-boards.greenhouse.io/vercel
    api: https://boards-api.greenhouse.io/v1/boards/vercel/jobs
    enabled: true

  - name: Supabase
    careers_url: https://jobs.ashbyhq.com/supabase
    enabled: true

  - name: dbt Labs
    careers_url: https://job-boards.greenhouse.io/dbtlabsinc
    api: https://boards-api.greenhouse.io/v1/boards/dbtlabsinc/jobs
    enabled: true

  - name: Astronomer
    careers_url: https://job-boards.greenhouse.io/astronomer
    api: https://boards-api.greenhouse.io/v1/boards/astronomer/jobs
    enabled: true
