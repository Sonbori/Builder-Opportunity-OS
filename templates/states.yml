# Builder Opportunity OS canonical states

states:
  - id: evaluated
    label: Evaluated
    aliases: [reviewed, scored]
    description: Opportunity evaluated, waiting for a decision
    dashboard_group: evaluated

  - id: pursuing
    label: Pursuing
    aliases: [contacted, responded, in_progress, followup]
    description: Active next step is in motion
    dashboard_group: pursuing

  - id: proposed
    label: Proposed
    aliases: [proposal_sent, quoted, scope_sent]
    description: A proposal, scope, or outbound pitch has been sent
    dashboard_group: proposed

  - id: applied
    label: Applied
    aliases: [submitted, sent]
    description: A formal application has been submitted
    dashboard_group: applied

  - id: interviewing
    label: Interviewing
    aliases: [interview, interviewing_process]
    description: In an interview or structured evaluation process
    dashboard_group: interviewing

  - id: won
    label: Won
    aliases: [offer, accepted, closed_won]
    description: Opportunity converted into a win
    dashboard_group: won

  - id: parked
    label: Parked
    aliases: [hold, later, backlog, discarded]
    description: Not dead, but not active right now
    dashboard_group: parked

  - id: rejected
    label: Rejected
    aliases: [lost, declined]
    description: Opportunity closed without success
    dashboard_group: rejected

  - id: skip
    label: SKIP
    aliases: [skip, no_fit, no_apply]
    description: Intentionally not pursuing
    dashboard_group: skip
